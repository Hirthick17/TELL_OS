<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopBot — WhatsApp Ecommerce Assistant</title>
  <meta name="description" content="Manage your ecommerce business through WhatsApp chat.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #111b21;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Phone Frame ─────────────────────────────────── */
    .phone {
      width: 390px;
      height: 844px;
      background: #0b141a;
      border-radius: 44px;
      border: 2px solid #2a3942;
      box-shadow: 0 40px 120px rgba(0,0,0,.8), 0 0 0 1px #1a2832;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Status bar ──────────────────────────────────── */
    .status-bar {
      background: #1f2c34;
      padding: 8px 20px 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #aebac1;
      flex-shrink: 0;
    }
    .status-time { font-weight: 600; }

    /* ── WhatsApp Header ─────────────────────────────── */
    .wa-header {
      background: #1f2c34;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a3942;
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 15px; font-weight: 600; color: #e9edef; }
    .contact-status { font-size: 12px; color: #8696a0; margin-top: 1px; }
    .header-icons { display: flex; gap: 16px; color: #8696a0; font-size: 18px; }
    .header-icons span { cursor: pointer; }

    /* ── Chat Area ────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 2px; }

    /* ── Date divider ──────────────────────────────────── */
    .date-divider {
      text-align: center;
      margin: 8px 0;
    }
    .date-divider span {
      background: #1f2c34;
      color: #8696a0;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
    }

    /* ── Message Bubbles ──────────────────────────────── */
    .message { display: flex; margin: 2px 0; animation: fadeUp .2s ease-out; }
    .message.bot { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .bubble {
      max-width: 78%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .bubble.bot { background: #1f2c34; color: #e9edef; border-top-left-radius: 2px; }
    .bubble.user { background: #005c4b; color: #e9edef; border-top-right-radius: 2px; }
    .bubble-text { white-space: pre-line; }
    .bubble-time {
      font-size: 10px;
      color: rgba(233,237,239,.5);
      text-align: right;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
    }
    .tick { color: #53bdeb; font-size: 12px; }

    /* ── Image bubble ─────────────────────────────────── */
    .bubble-img {
      width: 100%;
      max-width: 220px;
      border-radius: 6px;
      display: block;
      cursor: pointer;
    }

    /* ── File bubble ──────────────────────────────────── */
    .file-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }
    .file-icon { font-size: 28px; }
    .file-name { font-size: 13px; font-weight: 500; color: #e9edef; }
    .file-size { font-size: 11px; color: #8696a0; margin-top: 2px; }

    /* ── Dashboard card ───────────────────────────────── */
    .dashboard-card {
      background: rgba(37,211,102,.08);
      border: 1px solid rgba(37,211,102,.25);
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      display: block;
    }
    .dashboard-card:hover { background: rgba(37,211,102,.15); }
    .dashboard-card .dc-title { font-size: 13px; font-weight: 600; color: #25d366; margin-bottom: 3px; }
    .dashboard-card .dc-url { font-size: 11px; color: #53bdeb; }
    .dashboard-card .dc-hint { font-size: 11px; color: #8696a0; margin-top: 3px; }

    /* ── Upload hint ──────────────────────────────────── */
    .upload-hint {
      background: rgba(37,211,102,.06);
      border: 1px dashed rgba(37,211,102,.3);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      font-size: 12px;
      color: #25d366;
      text-align: center;
      cursor: pointer;
    }
    .upload-hint:hover { background: rgba(37,211,102,.12); }

    /* ── Typing indicator ─────────────────────────────── */
    .typing-wrap {
      display: flex;
      padding: 0 16px 8px;
      flex-shrink: 0;
    }
    .typing-bubble {
      background: #1f2c34;
      border-radius: 8px;
      border-top-left-radius: 2px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .dot { width: 7px; height: 7px; background: #8696a0; border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Input area ───────────────────────────────────── */
    .input-area {
      background: #1f2c34;
      padding: 8px 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 1px solid #2a3942;
      flex-shrink: 0;
    }
    .input-side { display: flex; gap: 12px; align-items: center; color: #8696a0; font-size: 20px; }
    .attach-label { cursor: pointer; transition: color .2s; }
    .attach-label:hover { color: #25d366; }
    #file-input { display: none; }

    .msg-input {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e9edef;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }
    .msg-input::placeholder { color: #8696a0; }

    .send-btn {
      width: 44px; height: 44px;
      background: #00a884;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #25d366; transform: scale(1.05); }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { background: #2a3942; cursor: not-allowed; transform: none; }

    /* ── Upload progress overlay ──────────────────────── */
    .upload-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .upload-overlay.show { display: flex; }
    .upload-box {
      background: #1f2c34;
      border: 1px solid #2a3942;
      border-radius: 16px;
      padding: 28px 36px;
      text-align: center;
      color: #e9edef;
    }
    .upload-box .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-box .upload-name { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .progress-track { height: 6px; background: #2a3942; border-radius: 3px; overflow: hidden; width: 220px; }
    .progress-fill { height: 100%; background: #25d366; border-radius: 3px; transition: width .3s; }
    /* ── WhatsApp CTA banner ───────────────────────────── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px 16px;
      min-height: 100vh;
      justify-content: center;
    }
    .wa-banner {
      background: linear-gradient(135deg, #1a3c34, #0d2b24);
      border: 1px solid rgba(37,211,102,.3);
      border-radius: 16px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 390px;
      width: 100%;
    }
    .wa-banner-icon { font-size: 32px; flex-shrink: 0; }
    .wa-banner-text { flex: 1; }
    .wa-banner-title { font-size: 13px; font-weight: 600; color: #e9edef; margin-bottom: 2px; }
    .wa-banner-sub { font-size: 11px; color: #8696a0; }
    .wa-banner-btn {
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
      transition: background .2s, transform .1s;
    }
    .wa-banner-btn:hover { background: #128c7e; transform: scale(1.03); }

    /* ── Floating WhatsApp button ──────────────────────── */
    .wa-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 58px; height: 58px;
      background: #25d366;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(37,211,102,.5);
      cursor: pointer;
      text-decoration: none;
      z-index: 999;
      transition: transform .2s, box-shadow .2s;
      animation: pulse-wa 2s infinite;
    }
    .wa-float:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(37,211,102,.7); }
    @keyframes pulse-wa {
      0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,.5); }
      50% { box-shadow: 0 4px 30px rgba(37,211,102,.8); }
    }
    .wa-float-tooltip {
      position: fixed;
      bottom: 90px;
      right: 24px;
      background: #1f2c34;
      color: #e9edef;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #2a3942;
      white-space: nowrap;
      z-index: 999;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }
    .wa-float:hover + .wa-float-tooltip { opacity: 1; transform: translateY(0); }

    @media (max-width: 480px) {
      body {
        background: #0b141a;
        display: block;
      }
      .page-wrap {
        padding: 0;
        gap: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: stretch;
      }
      .phone {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: none;
        box-shadow: none;
        flex: 1;
      }
      .wa-banner {
        display: none;
      }
    }
  </style>
</head>
<body>

<!-- WhatsApp floating button -->
<a class="wa-float" href="https://wa.me/15556592233?text=Hi%20ShopBot!" target="_blank" title="Chat on WhatsApp">
  <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>

<script>
// ── Session & State ──────────────────────────────────────
const SESSION_KEY = 'shopbot_session_id';
let SESSION_ID = localStorage.getItem(SESSION_KEY);
if (!SESSION_ID) {
  SESSION_ID = 'sess_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
  localStorage.setItem(SESSION_KEY, SESSION_ID);
}

let isBusy = false;

// ── Clock ─────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 30000);

function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

// ── Render a single message ──────────────────────────────
function renderMessage(msg) {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'message ' + (msg.role === 'user' ? 'user' : 'bot');

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (msg.role === 'user' ? 'user' : 'bot');

  const time = nowTime();

  if (msg.type === 'image' && msg.dataUrl) {
    // Image message
    const img = document.createElement('img');
    img.src = msg.dataUrl;
    img.className = 'bubble-img';
    img.alt = msg.name || 'Image';
    img.onclick = () => window.open(msg.dataUrl, '_blank');
    bubble.appendChild(img);
  } else if (msg.type === 'file') {
    // File attachment
    const fileDiv = document.createElement('div');
    fileDiv.className = 'file-bubble';
    fileDiv.innerHTML = `<span class="file-icon">📊</span>
      <div><div class="file-name">${escHtml(msg.name || 'File')}</div>
      <div class="file-size">Excel spreadsheet</div></div>`;
    bubble.appendChild(fileDiv);
  } else {
    // Text message
    const textDiv = document.createElement('div');
    textDiv.className = 'bubble-text';
    textDiv.textContent = msg.text || '';
    bubble.appendChild(textDiv);
  }

  // Dashboard card
  if (msg.dashboardUrl) {
    const card = document.createElement('a');
    card.href = msg.dashboardUrl;
    card.target = '_blank';
    card.className = 'dashboard-card';
    card.innerHTML = `<div class="dc-title">📊 Open Live Dashboard</div>
      <div class="dc-url">${escHtml(msg.dashboardUrl)}</div>
      <div class="dc-hint">Auto-refreshes every 10s • Tap to open</div>`;
    bubble.appendChild(card);
  }

  // Upload hint for bot messages asking for file
  if (msg.role === 'bot' && msg.text && /upload|excel|xlsx|file|attach|spreadsheet/i.test(msg.text)) {
    const hint = document.createElement('div');
    hint.className = 'upload-hint';
    hint.textContent = '📎 Tap the paperclip to attach your Excel file';
    hint.onclick = () => document.getElementById('file-input').click();
    bubble.appendChild(hint);
  }

  // Time
  const timeDiv = document.createElement('div');
  timeDiv.className = 'bubble-time';
  timeDiv.innerHTML = time + (msg.role === 'user' ? ' <span class="tick">✓✓</span>' : '');
  bubble.appendChild(timeDiv);

  wrap.appendChild(bubble);
  area.appendChild(wrap);
  scrollToBottom();
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Typing indicator ─────────────────────────────────────
function setTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  document.getElementById('bot-status').textContent = show ? 'typing...' : 'online';
  if (show) scrollToBottom();
}

// ── setBusy helper ────────────────────────────────────────
function setBusy(v) {
  isBusy = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('msg-input').disabled = v;
}

// ── Send text message ─────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isBusy) return;

  input.value = '';
  input.style.height = 'auto';

  renderMessage({ role: 'user', text });
  setBusy(true);
  setTyping(true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: SESSION_ID }),
    });

    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();

    setTyping(false);
    setBusy(false);

    if (data.error) {
      renderMessage({ role: 'bot', text: '❌ Error: ' + data.error });
      return;
    }

    renderMessage({
      role: 'bot',
      text: data.reply,
      dashboardUrl: data.dashboardUrl || null,
    });

    // P3: If server started async streaming insert, poll for completion
    if (data.processing) {
      startUploadPolling();
    }

  } catch (err) {
    setTyping(false);
    setBusy(false);
    renderMessage({ role: 'bot', text: '❌ Cannot reach server. Make sure `node server.js` is running.' });
    console.error('Chat error:', err);
  }
}

// ── File upload ────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || isBusy) return;
  e.target.value = ''; // reset input

  const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
  const isExcel = /\.(xlsx|xls|csv)$/i.test(file.name);

  if (!isImage && !isExcel) {
    renderMessage({ role: 'bot', text: '⚠️ Please upload an Excel file (.xlsx, .xls, .csv) or an image.' });
    return;
  }

  // For images, show preview immediately in chat
  if (isImage) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      renderMessage({ role: 'user', type: 'image', dataUrl: ev.target.result, name: file.name });
    };
    reader.readAsDataURL(file);
  } else {
    // Show file bubble
    renderMessage({ role: 'user', type: 'file', name: file.name });
  }

  // Show upload overlay
  document.getElementById('upload-name').textContent = file.name;
  document.getElementById('upload-overlay').classList.add('show');
  document.getElementById('progress-fill').style.width = '0%';

  setBusy(true);
  setTyping(true);

  // Fake progress animation
  let pct = 0;
  const ticker = setInterval(() => {
    pct = Math.min(pct + 10, 80);
    document.getElementById('progress-fill').style.width = pct + '%';
  }, 150);

  try {
    const form = new FormData();
    form.append('file', file);
    form.append('sessionId', SESSION_ID);

    const res = await fetch('/upload', { method: 'POST', body: form });
    clearInterval(ticker);
    document.getElementById('progress-fill').style.width = '100%';

    if (!res.ok) throw new Error('Upload failed: ' + res.status);
    const data = await res.json();

    await new Promise(r => setTimeout(r, 400)); // brief pause for UX
    document.getElementById('upload-overlay').classList.remove('show');
    setTyping(false);
    setBusy(false);

    if (data.error) {
      renderMessage({ role: 'bot', text: '❌ ' + data.error });
      return;
    }

    renderMessage({
      role: 'bot',
      text: data.reply,
      dashboardUrl: data.dashboardUrl || null,
    });

  } catch (err) {
    clearInterval(ticker);
    document.getElementById('upload-overlay').classList.remove('show');
    setTyping(false);
    setBusy(false);
    renderMessage({ role: 'bot', text: '❌ Upload failed. ' + err.message });
    console.error('Upload error:', err);
  }
});

// ── Keyboard shortcut ─────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── P3: Poll upload completion status ──────────────────────
// Polls /api/upload-status/:sessionId every 1.5s after async insert starts.
// Shows live row progress in status bar, then the done message+dashboard card.
let _uploadPollTimer = null;

function startUploadPolling() {
  if (_uploadPollTimer) return; // already polling
  document.getElementById('bot-status').textContent = 'processing data...';

  _uploadPollTimer = setInterval(async () => {
    try {
      const res  = await fetch('/api/upload-status/' + SESSION_ID);
      const data = await res.json();

      if (data.status === 'done') {
        clearInterval(_uploadPollTimer);
        _uploadPollTimer = null;
        document.getElementById('bot-status').textContent = 'online';

        // Fetch latest session messages — the done notification is there
        const msgRes  = await fetch('/session/' + SESSION_ID + '/messages');
        const msgData = await msgRes.json();
        if (msgData.messages && msgData.messages.length > 0) {
          // Render the last bot message (has the dashboard card)
          const lastBot = [...msgData.messages].reverse().find(m => m.role === 'bot' && m.dashboardUrl);
          if (lastBot) {
            renderMessage(lastBot);
          } else {
            const lastMsg = [...msgData.messages].reverse().find(m => m.role === 'bot');
            if (lastMsg) renderMessage(lastMsg);
          }
        }

      } else if (data.status === 'error') {
        clearInterval(_uploadPollTimer);
        _uploadPollTimer = null;
        document.getElementById('bot-status').textContent = 'online';
        renderMessage({ role: 'bot', text: '❌ Data save failed: ' + (data.error || 'unknown error. Please try again.') });

      } else if (data.status === 'processing' && data.total > 0) {
        // Live row count in the header status bar
        const pct = Math.round((data.inserted / data.total) * 100);
        document.getElementById('bot-status').textContent = `saving... ${data.inserted}/${data.total} rows (${pct}%)`;
      }
    } catch (_) {} // polling must never crash
  }, 1500);
}

// ── Restore session messages from server ──────────────────
async function restoreSession() {
  try {
    const res = await fetch('/session/' + SESSION_ID + '/messages');
    if (!res.ok) return false;
    const data = await res.json();
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(msg => renderMessage(msg));
      return true;
    }
  } catch {}
  return false;
}

// ── Initial greeting ──────────────────────────────────────
async function init() {
  setBusy(true);
  setTyping(true);

  // Restore previous session first
  const restored = await restoreSession();
  if (restored) {
    setTyping(false);
    setBusy(false);

    // Resume polling if a page refresh happened mid-upload
    try {
      const statusRes  = await fetch('/api/upload-status/' + SESSION_ID);
      const statusData = await statusRes.json();
      if (statusData.status === 'processing') {
        renderMessage({ role: 'bot', text: '⏳ Your previous upload is still being saved. I\'ll let you know when it\'s done!' });
        startUploadPolling();
      }
    } catch (_) {}
    return;
  }

  // Fresh session — send greeting
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Hi', sessionId: SESSION_ID }),
    });
    const data = await res.json();
    setTyping(false);
    setBusy(false);
    renderMessage({
      role: 'bot',
      text: data.reply || "👋 Hi! I'm ShopBot, your ecommerce assistant. How can I help?",
    });
  } catch {
    setTyping(false);
    setBusy(false);
    renderMessage({
      role: 'bot',
      text: "👋 Hi! I'm ShopBot.\n\n⚠️ Please make sure the backend is running:\n\nnode server.js",
    });
  }
}

window.addEventListener('load', init);
</script>
