<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopBot — WhatsApp Ecommerce Assistant</title>
  <meta name="description" content="Manage your ecommerce business through WhatsApp chat.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #111b21;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Phone Frame ─────────────────────────────────── */
    .phone {
      width: 390px;
      height: 844px;
      background: #0b141a;
      border-radius: 44px;
      border: 2px solid #2a3942;
      box-shadow: 0 40px 120px rgba(0,0,0,.8), 0 0 0 1px #1a2832;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Status bar ──────────────────────────────────── */
    .status-bar {
      background: #1f2c34;
      padding: 8px 20px 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #aebac1;
      flex-shrink: 0;
    }
    .status-time { font-weight: 600; }

    /* ── WhatsApp Header ─────────────────────────────── */
    .wa-header {
      background: #1f2c34;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a3942;
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 15px; font-weight: 600; color: #e9edef; }
    .contact-status { font-size: 12px; color: #8696a0; margin-top: 1px; }
    .header-icons { display: flex; gap: 16px; color: #8696a0; font-size: 18px; }
    .header-icons span { cursor: pointer; }

    /* ── Chat Area ────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 2px; }

    /* ── Date divider ──────────────────────────────────── */
    .date-divider {
      text-align: center;
      margin: 8px 0;
    }
    .date-divider span {
      background: #1f2c34;
      color: #8696a0;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
    }

    /* ── Message Bubbles ──────────────────────────────── */
    .message { display: flex; margin: 2px 0; animation: fadeUp .2s ease-out; }
    .message.bot { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .bubble {
      max-width: 78%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .bubble.bot { background: #1f2c34; color: #e9edef; border-top-left-radius: 2px; }
    .bubble.user { background: #005c4b; color: #e9edef; border-top-right-radius: 2px; }
    .bubble-text { white-space: pre-line; }
    .bubble-time {
      font-size: 10px;
      color: rgba(233,237,239,.5);
      text-align: right;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
    }
    .tick { color: #53bdeb; font-size: 12px; }

    /* ── Image bubble ─────────────────────────────────── */
    .bubble-img {
      width: 100%;
      max-width: 220px;
      border-radius: 6px;
      display: block;
      cursor: pointer;
    }

    /* ── File bubble ──────────────────────────────────── */
    .file-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }
    .file-icon { font-size: 28px; }
    .file-name { font-size: 13px; font-weight: 500; color: #e9edef; }
    .file-size { font-size: 11px; color: #8696a0; margin-top: 2px; }

    /* ── Dashboard card ───────────────────────────────── */
    .dashboard-card {
      background: rgba(37,211,102,.08);
      border: 1px solid rgba(37,211,102,.25);
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      display: block;
    }
    .dashboard-card:hover { background: rgba(37,211,102,.15); }
    .dashboard-card .dc-title { font-size: 13px; font-weight: 600; color: #25d366; margin-bottom: 3px; }
    .dashboard-card .dc-url { font-size: 11px; color: #53bdeb; }
    .dashboard-card .dc-hint { font-size: 11px; color: #8696a0; margin-top: 3px; }

    /* ── Upload hint ──────────────────────────────────── */
    .upload-hint {
      background: rgba(37,211,102,.06);
      border: 1px dashed rgba(37,211,102,.3);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      font-size: 12px;
      color: #25d366;
      text-align: center;
      cursor: pointer;
    }
    .upload-hint:hover { background: rgba(37,211,102,.12); }

    /* ── Typing indicator ─────────────────────────────── */
    .typing-wrap {
      display: flex;
      padding: 0 16px 8px;
      flex-shrink: 0;
    }
    .typing-bubble {
      background: #1f2c34;
      border-radius: 8px;
      border-top-left-radius: 2px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .dot { width: 7px; height: 7px; background: #8696a0; border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Input area ───────────────────────────────────── */
    .input-area {
      background: #1f2c34;
      padding: 8px 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 1px solid #2a3942;
      flex-shrink: 0;
    }
    .input-side { display: flex; gap: 12px; align-items: center; color: #8696a0; font-size: 20px; }
    .attach-label { cursor: pointer; transition: color .2s; }
    .attach-label:hover { color: #25d366; }
    #file-input { display: none; }

    .msg-input {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e9edef;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }
    .msg-input::placeholder { color: #8696a0; }

    .send-btn {
      width: 44px; height: 44px;
      background: #00a884;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #25d366; transform: scale(1.05); }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { background: #2a3942; cursor: not-allowed; transform: none; }

    /* ── Upload progress overlay ──────────────────────── */
    .upload-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .upload-overlay.show { display: flex; }
    .upload-box {
      background: #1f2c34;
      border: 1px solid #2a3942;
      border-radius: 16px;
      padding: 28px 36px;
      text-align: center;
      color: #e9edef;
    }
    .upload-box .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-box .upload-name { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .progress-track { height: 6px; background: #2a3942; border-radius: 3px; overflow: hidden; width: 220px; }
    .progress-fill { height: 100%; background: #25d366; border-radius: 3px; transition: width .3s; }
  </style>
</head>
<body>

<div class="phone" id="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time" id="clock">10:24</span>
    <span>📶 🔋</span>
  </div>

  <!-- Header -->
  <div class="wa-header">
    <div class="avatar">🤖</div>
    <div class="contact-info">
      <div class="contact-name">ShopBot</div>
      <div class="contact-status" id="bot-status">online</div>
    </div>
    <div class="header-icons">
      <span>📹</span><span>📞</span><span>⋮</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-area" id="chat-area">
    <div class="date-divider"><span>Today</span></div>
  </div>

  <!-- Typing indicator (hidden by default) -->
  <div class="typing-wrap" id="typing" style="display:none">
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-side">
      <span>😊</span>
      <label class="attach-label" for="file-input" title="Attach file">📎</label>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv,.jpg,.jpeg,.png,.gif,.webp">
    </div>
    <textarea
      id="msg-input"
      class="msg-input"
      placeholder="Message"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="resize(this)"
    ></textarea>
    <button id="send-btn" class="send-btn" onclick="sendMsg()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Upload progress overlay -->
<div class="upload-overlay" id="upload-overlay">
  <div class="upload-box">
    <div class="upload-icon">📤</div>
    <div class="upload-name" id="upload-name">Uploading...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<script>
// ── Session & State ──────────────────────────────────────
const SESSION_KEY = 'shopbot_session_id';
let SESSION_ID = localStorage.getItem(SESSION_KEY);
if (!SESSION_ID) {
  SESSION_ID = 'sess_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
  localStorage.setItem(SESSION_KEY, SESSION_ID);
}

let isBusy = false;

// ── Clock ─────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 30000);

function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

// ── Render a single message ──────────────────────────────
function renderMessage(msg) {
  const area = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'message ' + (msg.role === 'user' ? 'user' : 'bot');

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (msg.role === 'user' ? 'user' : 'bot');

  const time = nowTime();

  if (msg.type === 'image' && msg.dataUrl) {
    // Image message
    const img = document.createElement('img');
    img.src = msg.dataUrl;
    img.className = 'bubble-img';
    img.alt = msg.name || 'Image';
    img.onclick = () => window.open(msg.dataUrl, '_blank');
    bubble.appendChild(img);
  } else if (msg.type === 'file') {
    // File attachment
    const fileDiv = document.createElement('div');
    fileDiv.className = 'file-bubble';
    fileDiv.innerHTML = `<span class="file-icon">📊</span>
      <div><div class="file-name">${escHtml(msg.name || 'File')}</div>
      <div class="file-size">Excel spreadsheet</div></div>`;
    bubble.appendChild(fileDiv);
  } else {
    // Text message
    const textDiv = document.createElement('div');
    textDiv.className = 'bubble-text';
    textDiv.textContent = msg.text || '';
    bubble.appendChild(textDiv);
  }

  // Dashboard card
  if (msg.dashboardUrl) {
    const card = document.createElement('a');
    card.href = msg.dashboardUrl;
    card.target = '_blank';
    card.className = 'dashboard-card';
    card.innerHTML = `<div class="dc-title">📊 Open Live Dashboard</div>
      <div class="dc-url">${escHtml(msg.dashboardUrl)}</div>
      <div class="dc-hint">Auto-refreshes every 10s • Tap to open</div>`;
    bubble.appendChild(card);
  }

  // Upload hint for bot messages asking for file
  if (msg.role === 'bot' && msg.text && /upload|excel|xlsx|file|attach|spreadsheet/i.test(msg.text)) {
    const hint = document.createElement('div');
    hint.className = 'upload-hint';
    hint.textContent = '📎 Tap the paperclip to attach your Excel file';
    hint.onclick = () => document.getElementById('file-input').click();
    bubble.appendChild(hint);
  }

  // Time
  const timeDiv = document.createElement('div');
  timeDiv.className = 'bubble-time';
  timeDiv.innerHTML = time + (msg.role === 'user' ? ' <span class="tick">✓✓</span>' : '');
  bubble.appendChild(timeDiv);

  wrap.appendChild(bubble);
  area.appendChild(wrap);
  scrollToBottom();
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Typing indicator ─────────────────────────────────────
function setTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  document.getElementById('bot-status').textContent = show ? 'typing...' : 'online';
  if (show) scrollToBottom();
}

// ── setBusy helper ────────────────────────────────────────
function setBusy(v) {
  isBusy = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('msg-input').disabled = v;
}

// ── Send text message ─────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isBusy) return;

  input.value = '';
  input.style.height = 'auto';

  renderMessage({ role: 'user', text });
  setBusy(true);
  setTyping(true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: SESSION_ID }),
    });

    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();

    setTyping(false);
    setBusy(false);

    if (data.error) {
      renderMessage({ role: 'bot', text: '❌ Error: ' + data.error });
      return;
    }

    renderMessage({
      role: 'bot',
      text: data.reply,
      dashboardUrl: data.dashboardUrl || null,
    });

  } catch (err) {
    setTyping(false);
    setBusy(false);
    renderMessage({ role: 'bot', text: '❌ Cannot reach server. Make sure `node server.js` is running.' });
    console.error('Chat error:', err);
  }
}

// ── File upload ────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || isBusy) return;
  e.target.value = ''; // reset input

  const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
  const isExcel = /\.(xlsx|xls|csv)$/i.test(file.name);

  if (!isImage && !isExcel) {
    renderMessage({ role: 'bot', text: '⚠️ Please upload an Excel file (.xlsx, .xls, .csv) or an image.' });
    return;
  }

  // For images, show preview immediately in chat
  if (isImage) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      renderMessage({ role: 'user', type: 'image', dataUrl: ev.target.result, name: file.name });
    };
    reader.readAsDataURL(file);
  } else {
    // Show file bubble
    renderMessage({ role: 'user', type: 'file', name: file.name });
  }

  // Show upload overlay
  document.getElementById('upload-name').textContent = file.name;
  document.getElementById('upload-overlay').classList.add('show');
  document.getElementById('progress-fill').style.width = '0%';

  setBusy(true);
  setTyping(true);

  // Fake progress animation
  let pct = 0;
  const ticker = setInterval(() => {
    pct = Math.min(pct + 10, 80);
    document.getElementById('progress-fill').style.width = pct + '%';
  }, 150);

  try {
    const form = new FormData();
    form.append('file', file);
    form.append('sessionId', SESSION_ID);

    const res = await fetch('/upload', { method: 'POST', body: form });
    clearInterval(ticker);
    document.getElementById('progress-fill').style.width = '100%';

    if (!res.ok) throw new Error('Upload failed: ' + res.status);
    const data = await res.json();

    await new Promise(r => setTimeout(r, 400)); // brief pause for UX
    document.getElementById('upload-overlay').classList.remove('show');
    setTyping(false);
    setBusy(false);

    if (data.error) {
      renderMessage({ role: 'bot', text: '❌ ' + data.error });
      return;
    }

    renderMessage({
      role: 'bot',
      text: data.reply,
      dashboardUrl: data.dashboardUrl || null,
    });

  } catch (err) {
    clearInterval(ticker);
    document.getElementById('upload-overlay').classList.remove('show');
    setTyping(false);
    setBusy(false);
    renderMessage({ role: 'bot', text: '❌ Upload failed. ' + err.message });
    console.error('Upload error:', err);
  }
});

// ── Keyboard shortcut ─────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Restore session messages from server ──────────────────
async function restoreSession() {
  try {
    const res = await fetch('/session/' + SESSION_ID + '/messages');
    if (!res.ok) return;
    const data = await res.json();
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(msg => renderMessage(msg));
      return true;
    }
  } catch {}
  return false;
}

// ── Initial greeting ──────────────────────────────────────
async function init() {
  setBusy(true);
  setTyping(true);

  // Try to restore previous session first
  const restored = await restoreSession();
  if (restored) {
    setTyping(false);
    setBusy(false);
    return;
  }

  // Fresh session — send greeting
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Hi', sessionId: SESSION_ID }),
    });
    const data = await res.json();
    setTyping(false);
    setBusy(false);
    renderMessage({
      role: 'bot',
      text: data.reply || "👋 Hi! I'm ShopBot, your ecommerce assistant. How can I help?",
    });
  } catch {
    setTyping(false);
    setBusy(false);
    renderMessage({
      role: 'bot',
      text: "👋 Hi! I'm ShopBot.\n\n⚠️ Please make sure the backend is running:\n\nnode server.js",
    });
  }
}

window.addEventListener('load', init);
</script>
</body>
</html>
